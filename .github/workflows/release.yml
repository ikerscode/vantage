name: Release

# BRIEF v1.5 Phase 2: a separate, deliberate trigger from ci.yml — pushing an
# app-v* tag still runs the full ci.yml suite too (that workflow's own
# `on.push.tags` matches the same pattern), so a release is never published
# without the same test/frontend/security-scan/build-desktop validation any
# other push gets. This workflow's only additional job is turning that build
# into an actual GitHub Release with the per-OS installers attached.
on:
  push:
    tags: ["app-v*"]

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Same reconciled package list as ci.yml's build-desktop job — see
      # that job's comment for where each package came from.
      - name: Install Linux system dependencies for Tauri
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/launcher/src-tauri -> target
            apps/launcher/launcher-core -> target

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build the frontend
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Install the launcher's Tauri CLI
        working-directory: apps/launcher
        run: npm ci

      # Same signing posture as ci.yml: wired, not blocking. Unsigned
      # releases are labeled as such by Gatekeeper/SmartScreen themselves —
      # this workflow doesn't need to do anything extra to "label" that.
      #
      # Same fix as ci.yml's build-desktop job (found for real in CI, BRIEF
      # v1.5): `${{ secrets.X }}` evaluates to an empty string when a secret
      # doesn't exist rather than omitting the env var, and Tauri's macOS
      # bundler treats Ok("") the same as "signing requested" — only write
      # each var into $GITHUB_ENV when genuinely non-empty, so it's truly
      # absent (Err) rather than present-but-empty when unconfigured.
      - name: Export signing secrets only when actually configured (avoids Ok("") vs Err(NotPresent))
        shell: bash
        run: |
          set_if_present() {
            if [ -n "$2" ]; then
              echo "$1=$2" >> "$GITHUB_ENV"
            fi
          }
          set_if_present APPLE_CERTIFICATE "${{ secrets.APPLE_CERTIFICATE }}"
          set_if_present APPLE_CERTIFICATE_PASSWORD "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
          set_if_present APPLE_SIGNING_IDENTITY "${{ secrets.APPLE_SIGNING_IDENTITY }}"
          set_if_present APPLE_ID "${{ secrets.APPLE_ID }}"
          set_if_present APPLE_PASSWORD "${{ secrets.APPLE_PASSWORD }}"
          set_if_present APPLE_TEAM_ID "${{ secrets.APPLE_TEAM_ID }}"
          set_if_present WINDOWS_CERTIFICATE "${{ secrets.WINDOWS_CERTIFICATE }}"
          set_if_present WINDOWS_CERTIFICATE_PASSWORD "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"

      - name: Build, sign (if configured), and publish to the GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/launcher
          tagName: ${{ github.ref_name }}
          releaseName: "VANTAGE ${{ github.ref_name }}"
          releaseBody: |
            See CI_REPORT.md and INSTALL.md for what's in this build, current
            signing status, and per-OS install instructions.

            **Fully offline / air-gapped install**: the installers above do
            NOT embed the container-image bundle — it's ~6.6 GiB, over 3x
            GitHub's hard 2 GiB release-asset cap even before adding the
            installer itself (see OFFLINE_BUNDLE_REPORT.md). Download every
            `vantage-images-*.tar.part-*` asset plus the matching
            `.tar.sha256` file below, then on the target machine:

            ```
            cat vantage-images-*.tar.part-* > vantage-images-1.0.0.tar
            sha256sum -c vantage-images-1.0.0.tar.sha256
            ```

            Place the reassembled `vantage-images-1.0.0.tar` in VANTAGE's
            data directory (see INSTALL.md's table) before first launch —
            the launcher loads it from there automatically. See
            docs/AIRGAP.md.
          releaseDraft: true
          prerelease: false

  # BRIEF v1.6: the offline image bundle (~6.6 GiB — see
  # OFFLINE_BUNDLE_REPORT.md) doesn't fit as a single release asset (hard
  # 2 GiB/file cap) or embedded in an installer (same cap, plus it would
  # roughly double every push's build-desktop time for no benefit — only
  # tagged releases are real distribution points). Ships as chunked release
  # assets instead, built once (not once per matrix platform) and attached
  # to the same release the `release` job above just created.
  offline-bundle:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reclaim disk space from unused preinstalled toolchains
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/local/.ghcup \
            /usr/share/dotnet /usr/local/share/powershell /usr/local/share/chromium \
            /usr/local/lib/node_modules 2>/dev/null || true

      - name: Build every image for real (scripts/package/build-images.sh)
        run: VANTAGE_VERSION=1.0.0 ./scripts/package/build-images.sh

      - name: Save every image into one offline tarball (scripts/package/save-images.sh)
        run: VANTAGE_VERSION=1.0.0 ./scripts/package/save-images.sh

      - name: Split into <2 GiB chunks for release assets (scripts/package/split-images.sh)
        run: VANTAGE_VERSION=1.0.0 ./scripts/package/split-images.sh

      - name: Attach chunks + checksum to the release this tag just created
        run: |
          gh release upload "${{ github.ref_name }}" \
            infra/vantage-images-1.0.0.tar.part-* \
            infra/vantage-images-1.0.0.tar.sha256 \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
