[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vantage-geo"
version = "0.1.0"
description = "Pure geospatial functions for VANTAGE: NDVI, cloud masking, change detection, chipping, pixel<->geo transforms."
requires-python = ">=3.11"
dependencies = [
    "numpy~=1.26",
    "rasterio~=1.3",
]

[project.optional-dependencies]
dev = [
    "pytest~=8.0",
    "pytest-cov~=5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/vantage_geo"]
