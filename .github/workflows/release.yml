name: Release

# BRIEF v1.5 Phase 2: a separate, deliberate trigger from ci.yml — pushing an
# app-v* tag still runs the full ci.yml suite too (that workflow's own
# `on.push.tags` matches the same pattern), so a release is never published
# without the same test/frontend/security-scan/build-desktop validation any
# other push gets. This workflow's only additional job is turning that build
# into an actual GitHub Release with the per-OS installers attached.
on:
  push:
    tags: ["app-v*"]

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Same reconciled package list as ci.yml's build-desktop job — see
      # that job's comment for where each package came from.
      - name: Install Linux system dependencies for Tauri
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/launcher/src-tauri -> target
            apps/launcher/launcher-core -> target

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build the frontend
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Install the launcher's Tauri CLI
        working-directory: apps/launcher
        run: npm ci

      # Same signing posture as ci.yml: wired, not blocking. Unsigned
      # releases are labeled as such by Gatekeeper/SmartScreen themselves —
      # this workflow doesn't need to do anything extra to "label" that.
      #
      # Same fix as ci.yml's build-desktop job (found for real in CI, BRIEF
      # v1.5): `${{ secrets.X }}` evaluates to an empty string when a secret
      # doesn't exist rather than omitting the env var, and Tauri's macOS
      # bundler treats Ok("") the same as "signing requested" — only write
      # each var into $GITHUB_ENV when genuinely non-empty, so it's truly
      # absent (Err) rather than present-but-empty when unconfigured.
      - name: Export signing secrets only when actually configured (avoids Ok("") vs Err(NotPresent))
        shell: bash
        run: |
          set_if_present() {
            if [ -n "$2" ]; then
              echo "$1=$2" >> "$GITHUB_ENV"
            fi
          }
          set_if_present APPLE_CERTIFICATE "${{ secrets.APPLE_CERTIFICATE }}"
          set_if_present APPLE_CERTIFICATE_PASSWORD "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
          set_if_present APPLE_SIGNING_IDENTITY "${{ secrets.APPLE_SIGNING_IDENTITY }}"
          set_if_present APPLE_ID "${{ secrets.APPLE_ID }}"
          set_if_present APPLE_PASSWORD "${{ secrets.APPLE_PASSWORD }}"
          set_if_present APPLE_TEAM_ID "${{ secrets.APPLE_TEAM_ID }}"
          set_if_present WINDOWS_CERTIFICATE "${{ secrets.WINDOWS_CERTIFICATE }}"
          set_if_present WINDOWS_CERTIFICATE_PASSWORD "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"

      - name: Build, sign (if configured), and publish to the GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/launcher
          tagName: ${{ github.ref_name }}
          releaseName: "VANTAGE ${{ github.ref_name }}"
          releaseBody: |
            See CI_REPORT.md and INSTALL.md for what's in this build, current
            signing status, and per-OS install instructions.

            **Fully offline / air-gapped install**: the installers above do
            NOT embed the container-image bundle — it's ~6.6 GiB, over 3x
            GitHub's hard 2 GiB release-asset cap even before adding the
            installer itself (see OFFLINE_BUNDLE_REPORT.md). Download every
            `vantage-images-*.tar.part-*` asset plus the matching
            `.tar.sha256` file below, then on the target machine:

            ```
            cat vantage-images-*.tar.part-* > vantage-images-1.0.0.tar
            sha256sum -c vantage-images-1.0.0.tar.sha256
            ```

            Place the reassembled `vantage-images-1.0.0.tar` in VANTAGE's
            data directory (see INSTALL.md's table) before first launch —
            the launcher loads it from there automatically. See
            docs/AIRGAP.md.
          releaseDraft: true
          prerelease: false

  # Builds every production image once (not once per matrix platform) and
  # distributes them both ways BRIEF v1.7 ships (see PACKAGING_V2_REPORT.md
  # for why both are real, needed paths, not redundant):
  #
  #   - Air-gap bundle (BRIEF v1.6): the real tarball — ~2.7 GiB as of
  #     BRIEF v1.7's size fixes (was 6.6 GiB) — still doesn't fit a single
  #     release asset (hard 2 GiB/file cap) or an installer, so it ships as
  #     chunked release assets the operator downloads separately.
  #   - Thin/online install (BRIEF v1.7): the same images, pushed to GHCR
  #     (free for this public repo) so a normal install with network access
  #     never needs the multi-GB bundle at all — apps/launcher/launcher-
  #     core/src/images.rs pulls them automatically on first run when no
  #     local tarball is found.
  publish-images:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release upload
      packages: write   # docker push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Reclaim disk space from unused preinstalled toolchains
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/local/.ghcup \
            /usr/share/dotnet /usr/local/share/powershell /usr/local/share/chromium \
            /usr/local/lib/node_modules 2>/dev/null || true

      - name: Build every image for real (scripts/package/build-images.sh)
        run: VANTAGE_VERSION=1.0.0 ./scripts/package/build-images.sh

      - name: Save every image into one offline tarball (scripts/package/save-images.sh)
        run: VANTAGE_VERSION=1.0.0 ./scripts/package/save-images.sh

      - name: Split into <2 GiB chunks for release assets (scripts/package/split-images.sh)
        run: VANTAGE_VERSION=1.0.0 ./scripts/package/split-images.sh

      - name: Attach chunks + checksum to the release this tag just created
        run: |
          gh release upload "${{ github.ref_name }}" \
            infra/vantage-images-1.0.0.tar.part-* \
            infra/vantage-images-1.0.0.tar.sha256 \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tagged by VANTAGE_VERSION (the image-bundle version — see
      # build-images.sh), not the launcher's own git release tag: the two
      # version numbers are already deliberately decoupled everywhere else
      # in this repo (docker-compose.prod.yml's defaults, secrets.rs's
      # hardcoded image references), and launcher-core/src/images.rs's
      # REQUIRED_IMAGES list needs a fixed, predictable reference to pull —
      # not one that changes on every launcher-only release.
      #
      # NOTE (operator action required — see PACKAGING_V2_REPORT.md):
      # packages pushed to GHCR default to PRIVATE regardless of the
      # repo's own visibility, and GITHUB_TOKEN cannot change that (GitHub
      # Packages visibility management requires a classic PAT). Each of
      # these 4 packages needs a one-time "make public" click (or API call
      # with a classic PAT) before an anonymous thin-installer pull will
      # actually succeed — this push alone is not sufficient on its own.
      - name: Push production images to GHCR (thin/online installer path)
        run: |
          for img in vantage-api vantage-tiler vantage-inference vantage-pgstac-migrate; do
            docker tag "$img:1.0.0" "ghcr.io/ikerscode/$img:1.0.0"
            docker push "ghcr.io/ikerscode/$img:1.0.0"
          done

  # BRIEF v1.6: the actual BRIEF v1.3 §12 acceptance test — "install on a
  # clean machine, cut network access, launch, confirm the demo AOI renders
  # real Sentinel-2 imagery with zero network calls" — never done once,
  # including by v1.5, which only ever compiled the installer, never
  # installed or ran it. A fresh GitHub-hosted runner stands in for "clean
  # machine": real root, nothing of this repo pre-installed, and it
  # downloads the SAME release assets an end user would (not a build
  # artifact this workflow already has lying around).
  airgap-acceptance-test:
    needs: [release, publish-images]
    runs-on: ubuntu-22.04
    steps:
      # Only for scripts/smoke.sh's already-correct, already-proven tile-
      # fetch logic below (real z/x/y math, no hardcoded STAC item IDs) —
      # not something a real end user needs; they only get the two release
      # downloads the next step fetches.
      - uses: actions/checkout@v4

      - name: Download the real release assets — exactly what an end user gets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" --repo "${{ github.repository }}" \
            --pattern "VANTAGE_*_amd64.deb" \
            --pattern "vantage-images-1.0.0.tar.part-*" \
            --pattern "vantage-images-1.0.0.tar.sha256"
          ls -la

      - name: Reassemble and verify the offline bundle by extraction, not step-success
        run: |
          cat vantage-images-1.0.0.tar.part-* > vantage-images-1.0.0.tar
          sha256sum -c vantage-images-1.0.0.tar.sha256
          rm vantage-images-1.0.0.tar.part-*

      - name: Prove a real image is genuinely loadable from the reassembled tarball
        run: |
          docker load -i vantage-images-1.0.0.tar
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}"
          docker image inspect vantage-api:1.0.0 vantage-tiler:1.0.0 vantage-inference:1.0.0 vantage-pgstac-migrate:1.0.0 \
            --format "loaded OK: {{.RepoTags}} ({{.Id}})"

      - name: Install the real .deb on this clean machine
        run: |
          sudo apt-get update
          sudo dpkg -i VANTAGE_*_amd64.deb || sudo apt-get install -f -y

      - name: Locate the installed binary (discovered, not assumed)
        id: find_bin
        run: |
          bin=$(dpkg -L vantage 2>/dev/null | grep -E '/(usr/bin|opt)/.*[Vv][Aa][Nn][Tt][Aa][Gg][Ee]' | grep -v '\.so' | head -1)
          if [ -z "$bin" ]; then
            bin=$(find /usr/bin /opt -iname "*vantage*" -type f -executable 2>/dev/null | head -1)
          fi
          echo "found binary: $bin"
          test -x "$bin"
          echo "bin=$bin" >> "$GITHUB_OUTPUT"

      # A dedicated, unprivileged user to run the GUI launcher as — NOT the
      # `runner` user the GitHub Actions agent itself runs as. Found for
      # real in the first attempt at this job: a blanket `iptables -P
      # OUTPUT DROP` cuts the runner agent's OWN connectivity too (it's a
      # host process like any other), so GitHub's orchestration concluded
      # the runner had died and CANCELLED the job after ~10 minutes — the
      # launcher kept running the whole time (its log only couldn't be
      # streamed back until network was restored). Scoping the cut to this
      # user's UID instead leaves the agent (a different UID) completely
      # unaffected while still genuinely cutting the app's own network path.
      - name: Create a dedicated user to run the GUI launcher as
        run: |
          sudo useradd -m -s /bin/bash vantagetest
          sudo usermod -aG docker vantagetest
          # A real login (via a display/session manager) gets this from
          # systemd-logind/pam_systemd automatically; `sudo -u` doesn't
          # provide one at all, which is a separate, distinct problem from
          # the D-Bus session bus fixed previously — various GTK/portal
          # machinery (used indirectly by the tray icon) needs a real,
          # correctly-owned XDG_RUNTIME_DIR to create its own sockets/files.
          uid=$(id -u vantagetest)
          sudo mkdir -p "/run/user/$uid"
          sudo chown vantagetest:vantagetest "/run/user/$uid"
          sudo chmod 700 "/run/user/$uid"
          echo "VANTAGETEST_UID=$uid" >> "$GITHUB_ENV"

      - name: Place the offline bundle where the launcher expects an operator-provided one (docs/AIRGAP.md)
        run: |
          sudo -u vantagetest mkdir -p /home/vantagetest/.local/share/VANTAGE
          sudo cp vantage-images-1.0.0.tar /home/vantagetest/.local/share/VANTAGE/vantage-images-1.0.0.tar
          sudo chown vantagetest:vantagetest /home/vantagetest/.local/share/VANTAGE/vantage-images-1.0.0.tar

      - name: Install Xvfb (headless display for the GUI launcher)
        run: sudo apt-get install -y xvfb

      # This is the actual claim under test: the launcher (and its direct
      # HTTP calls) must work with no real internet egress at all — proven
      # by blocking every packet vantagetest's UID originates. Docker's
      # container-to-container traffic goes through the kernel's FORWARD
      # chain, not OUTPUT (and is driven by dockerd, running as root, not
      # by this UID), so it's deliberately untouched here — blocking it
      # would test something this app never claimed (containers not
      # needing internet to talk to EACH OTHER was never in question; not
      # needing internet to talk to the outside world is). The app's
      # architecture already has independent evidence for the container
      # side too (PACKAGE_REPORT.md's static grep audit for external URLs
      # found none outside the online-mode-only earth_search.py adapter).
      - name: Cut network access for the launcher's own user (real air-gap simulation, runner agent unaffected)
        run: |
          sudo iptables -A OUTPUT -m owner --uid-owner vantagetest -j DROP
          sudo iptables -L OUTPUT -v

      # Found for real in CI (this attempt, and the one before it): the
      # tray icon (built in main.rs's setup() hook, via `?` — a failure
      # there aborts the whole setup closure before boot::run()'s thread is
      # ever spawned) needs both a D-Bus session bus (fixed previously via
      # dbus-run-session) AND a real XDG_RUNTIME_DIR (fixed just above) —
      # both are things a real login session provides automatically via
      # systemd-logind/pam_systemd, which `sudo -u` doesn't. Both were
      # needed; fixing only the first still left tray creation failing
      # with the exact same PermissionDenied.
      - name: Launch VANTAGE headlessly as the isolated user, with its network cut
        run: |
          sudo -H -u vantagetest env "XDG_RUNTIME_DIR=/run/user/${VANTAGETEST_UID}" \
            bash -c 'dbus-run-session -- xvfb-run -a "${{ steps.find_bin.outputs.bin }}"' > launcher-stdout.log 2>&1 &
          echo $! > launcher.pid
          sleep 2
          echo "launched pid $(cat launcher.pid)"

      - name: Wait for the health-gate to report ready (up to 7 minutes, matching boot.rs's own timeout)
        run: |
          for i in $(seq 1 210); do
            if curl -sf http://127.0.0.1:8000/api/health >/dev/null 2>&1 && curl -sf http://127.0.0.1:8001/health >/dev/null 2>&1; then
              echo "healthy after ~$((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::never became healthy within 420s"
          cat launcher-stdout.log
          exit 1

      # The actual headline result. Reuses scripts/smoke.sh itself rather
      # than a hand-rolled request sequence — it already does exactly what
      # this needs (dynamic tilejson + real z/x/y tile math, no hardcoded
      # STAC item IDs) and is proven correct against live Earth Search;
      # /api/stac/search is fully backend-agnostic (see
      # apps/api/app/routers/stac.py — it just calls
      # get_imagery_source().search(), same code path regardless of
      # IMAGERY_SOURCE), and smoke.sh's own fixed DATE_A/DATE_B
      # (2025-11-01 / 2025-06-19) already match infra/demo-data/manifest.json
      # exactly — not a coincidence, the same demo scenes back both modes.
      # TILER_TOKEN must be this specific install's real generated secret,
      # not smoke.sh's dev-mode default. Steps 0-6 (health/auth/AOI/search/
      # tiles/analysis) are what "renders real imagery" means; step 7
      # (detections) is an honest-empty pass by design (see the script's own
      # comment); step 8 (monitor-sweep) needs a host-reachable `db`
      # hostname the same way v1.5's dev-compose test did, and this
      # packaged run doesn't set COMPOSE_FILE (there's no compose CLI
      # invocation an end user would ever run directly) — expected to fail
      # for that reason alone, not a regression, and not evidence against
      # the actual claim under test.
      - name: Confirm the demo AOI renders real Sentinel-2 imagery with zero network calls (scripts/smoke.sh, offline mode)
        run: |
          TILER_TOKEN=$(sudo grep '^TILER_TOKEN=' /home/vantagetest/.local/share/VANTAGE/config/.env | cut -d= -f2-)
          test -n "$TILER_TOKEN"
          API_BASE_URL=http://127.0.0.1:8000 TILER_BASE_URL=http://127.0.0.1:8001 TILER_TOKEN="$TILER_TOKEN" \
            ./scripts/smoke.sh 2>&1 | tee smoke-offline.log || true
          echo "--- checking the specific evidence that matters for this claim ---"
          grep -q "PASS: issued a dev token" smoke-offline.log
          grep -q "PASS: created AOI" smoke-offline.log
          grep -q "PASS: found .* scene(s) for 2025-11-01" smoke-offline.log
          grep -q "PASS: found .* scene(s) for 2025-06-19" smoke-offline.log
          grep -q "PASS: true-color tile fetched" smoke-offline.log
          grep -q "PASS: NDVI tile fetched" smoke-offline.log
          grep -q "PASS: analysis completed" smoke-offline.log
          grep -q "PASS: change-map tile fetched" smoke-offline.log
          echo "ALL REQUIRED EVIDENCE PRESENT: demo AOI genuinely rendered real Sentinel-2 imagery, offline, from the bundled static catalog"

      - name: Restore network access (cleanup — the runner-scoped default policy was never touched, only vantagetest's rule)
        if: always()
        run: sudo iptables -D OUTPUT -m owner --uid-owner vantagetest -j DROP || true

      - name: Dump launcher + smoke-test logs (always, for the report)
        if: always()
        run: |
          echo "::group::launcher-stdout.log"
          cat launcher-stdout.log || true
          echo "::endgroup::"
          echo "::group::smoke-offline.log"
          cat smoke-offline.log || true
          echo "::endgroup::"

  # BRIEF v1.7: the actual point of the thin/online installer — most real
  # users should hit this path, not the air-gap one, and it had never been
  # tested at all before now. A fresh runner with real network access, no
  # offline bundle placed anywhere, confirms the launcher genuinely pulls
  # from GHCR (not the pre-v1.7 behavior of silently doing nothing) and the
  # demo AOI still renders — same real standard as airgap-acceptance-test,
  # just for the opposite precondition.
  thin-installer-acceptance-test:
    needs: [release, publish-images]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download only the installer — exactly what a thin-install end user gets (no offline bundle)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" --repo "${{ github.repository }}" \
            --pattern "VANTAGE_*_amd64.deb"
          ls -la

      - name: Install the real .deb on this clean machine
        run: |
          sudo apt-get update
          sudo dpkg -i VANTAGE_*_amd64.deb || sudo apt-get install -f -y

      - name: Locate the installed binary (discovered, not assumed)
        id: find_bin
        run: |
          bin=$(dpkg -L vantage 2>/dev/null | grep -E '/(usr/bin|opt)/.*[Vv][Aa][Nn][Tt][Aa][Gg][Ee]' | grep -v '\.so' | head -1)
          if [ -z "$bin" ]; then
            bin=$(find /usr/bin /opt -iname "*vantage*" -type f -executable 2>/dev/null | head -1)
          fi
          echo "found binary: $bin"
          test -x "$bin"
          echo "bin=$bin" >> "$GITHUB_OUTPUT"

      - name: Install Xvfb (headless display for the GUI launcher)
        run: sudo apt-get install -y xvfb

      # Same D-Bus-session + XDG_RUNTIME_DIR fixes the air-gap acceptance
      # test needed (BRIEF v1.6) — a real login session provides both via
      # systemd-logind/pam_systemd, which this runner's default `runner`
      # user doesn't have. Applied up front here since they're already
      # proven necessary, not rediscovered the slow way a second time.
      - name: Prepare a real XDG_RUNTIME_DIR for the runner user
        run: |
          uid=$(id -u)
          sudo mkdir -p "/run/user/$uid"
          sudo chown "$(whoami)":"$(whoami)" "/run/user/$uid"
          sudo chmod 700 "/run/user/$uid"
          echo "RUNNER_UID=$uid" >> "$GITHUB_ENV"

      # No tarball anywhere, no network cut — this IS the thin-installer
      # claim under test: does it genuinely pull from GHCR on its own.
      - name: Launch VANTAGE headlessly with real network access, no offline bundle present
        run: |
          env "XDG_RUNTIME_DIR=/run/user/${RUNNER_UID}" \
            dbus-run-session -- xvfb-run -a "${{ steps.find_bin.outputs.bin }}" > launcher-stdout.log 2>&1 &
          echo $! > launcher.pid
          sleep 2
          echo "launched pid $(cat launcher.pid)"

      - name: Wait for the health-gate to report ready (up to 7 minutes, matching boot.rs's own timeout)
        run: |
          for i in $(seq 1 210); do
            if curl -sf http://127.0.0.1:8000/api/health >/dev/null 2>&1 && curl -sf http://127.0.0.1:8001/health >/dev/null 2>&1; then
              echo "healthy after ~$((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::never became healthy within 420s"
          cat launcher-stdout.log
          exit 1

      # The actual headline result for this path: confirm the launcher's
      # own log shows it genuinely pulled from the registry (not a silent
      # no-op, which was the pre-v1.7 behavior for a missing tarball).
      - name: Confirm images were pulled from GHCR, not found locally
        run: |
          grep -q "pulled images from the container registry" launcher-stdout.log
          echo "CONFIRMED: thin installer pulled real images from GHCR, not a bundled tarball"

      - name: Confirm the demo AOI renders real Sentinel-2 imagery (scripts/smoke.sh)
        run: |
          TILER_TOKEN=$(grep '^TILER_TOKEN=' ~/.local/share/VANTAGE/config/.env | cut -d= -f2-)
          test -n "$TILER_TOKEN"
          API_BASE_URL=http://127.0.0.1:8000 TILER_BASE_URL=http://127.0.0.1:8001 TILER_TOKEN="$TILER_TOKEN" \
            ./scripts/smoke.sh 2>&1 | tee smoke-thin.log || true
          echo "--- checking the specific evidence that matters for this claim ---"
          grep -q "PASS: issued a dev token" smoke-thin.log
          grep -q "PASS: created AOI" smoke-thin.log
          grep -q "PASS: true-color tile fetched" smoke-thin.log
          grep -q "PASS: NDVI tile fetched" smoke-thin.log
          grep -q "PASS: analysis completed" smoke-thin.log
          grep -q "PASS: change-map tile fetched" smoke-thin.log
          echo "ALL REQUIRED EVIDENCE PRESENT: demo AOI genuinely rendered real Sentinel-2 imagery via the thin-installer (GHCR-pulled) path"

      - name: Dump launcher + smoke-test logs (always, for the report)
        if: always()
        run: |
          echo "::group::launcher-stdout.log"
          cat launcher-stdout.log || true
          echo "::endgroup::"
          echo "::group::smoke-thin.log"
          cat smoke-thin.log || true
          echo "::endgroup::"
