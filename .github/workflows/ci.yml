name: CI

# BRIEF v1.5: the first genuine, continuous, non-synthetic proof this stack
# runs — real Dockerfile builds, a real docker compose stack, scripts/smoke.sh
# against live Sentinel-2, and (build-desktop) the first real compile of the
# Tauri launcher this project has ever produced, on real Linux/macOS/Windows
# runners with root and a real Docker daemon, none of which the development
# sandbox this codebase was built in has ever had. See RECONCILIATION_REPORT.md
# and CI_REPORT.md.
on:
  push:
    branches: [main]
    tags: ["app-v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# BRIEF v1.9: least privilege, explicit rather than inherited. None of this
# workflow's jobs (test, frontend, security-scan, build-desktop) write to the
# repo, its packages, or anything else — they build, test, and scan. Pinning
# read-only here overrides whatever the repository/account-level default
# happens to be (which can silently be read+write), so a future job can't
# quietly gain write access just by existing.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # The hero-slice proof: real Dockerfile builds (every one of them changed
  # by v1.4's non-root/hash-pinned-lockfile hardening, never actually built
  # by a container runtime until this job exists), a real docker compose
  # stack, and scripts/smoke.sh against live Sentinel-2 — continuously, on
  # every push, not a one-off manual sandbox run.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: packages/geo — real unit test suite (NDVI, cloud masking, diff, transforms)
        run: |
          python -m venv packages/geo/.venv
          packages/geo/.venv/bin/pip install --quiet -e "packages/geo[dev]"
          packages/geo/.venv/bin/python -m pytest packages/geo/tests/ -v

      - name: apps/api — real unit test suite (fail-closed secret validation, SEC-04)
        run: |
          python -m venv apps/api/.venv
          apps/api/.venv/bin/pip install --quiet -e packages/geo
          apps/api/.venv/bin/pip install --quiet -e "apps/api[dev]"
          apps/api/.venv/bin/python -m pytest apps/api/tests/ -v

      - name: services/tiler — real unit test suite (SSRF hardening, SEC-01)
        run: |
          python -m venv services/tiler/.venv
          services/tiler/.venv/bin/pip install --quiet -e "services/tiler[dev]"
          services/tiler/.venv/bin/python -m pytest services/tiler/tests/ -v

      - name: Generate real per-install secrets (same script a real first run uses)
        run: python3 scripts/generate_dev_secrets.py

      # SECURITY (found for real in this workflow's own first run — see
      # CI_REPORT.md): values loaded into $GITHUB_ENV from a generated file
      # are NOT automatically masked in subsequent step logs — GitHub only
      # auto-masks values that flow through the `secrets.*` context. A
      # later step's routine env-dump (e.g. `docker compose ... ps`) would
      # otherwise print every generated secret in plaintext, in a PUBLIC
      # repo's logs. `::add-mask::` is a workflow command that must reach
      # actual stdout (unredirected) for the runner to act on it — it must
      # NOT be written into the $GITHUB_ENV file itself, which is just a
      # plain KEY=value file the runner reads afterward, not a command
      # stream. So this writes to each destination explicitly instead of
      # redirecting the whole script's stdout to one place.
      - name: Load generated env into subsequent steps (masked)
        run: |
          python3 -c "
          import os
          with open('infra/.env') as f, open(os.environ['GITHUB_ENV'], 'a') as env_out:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith('#') or '=' not in line:
                      continue
                  key, _, value = line.partition('=')
                  print(f'::add-mask::{value}')
                  env_out.write(f'{key}={value}\n')
          "

      - name: Bring up the real stack — real Dockerfile builds, real Postgres/Redis/MinIO/api/worker/beat/tiler/inference
        working-directory: infra
        run: docker compose -f docker-compose.yml up -d --build --wait --wait-timeout 900

      - name: Show what's actually running
        if: always()
        working-directory: infra
        run: docker compose -f docker-compose.yml ps -a

      - name: Run scripts/smoke.sh against live Sentinel-2 (real Earth Search, real STAC, real tiles, real change-detection)
        env:
          API_BASE_URL: http://localhost:8000
          TILER_BASE_URL: http://localhost:8001
          # `db` has no published host port and isn't resolvable from the
          # runner (found for real in CI, BRIEF v1.5 — see smoke.sh's own
          # comment) — COMPOSE_FILE tells the monitor-sweep step to exec
          # into the running containers instead of the host.
          COMPOSE_FILE: infra/docker-compose.yml
        run: ./scripts/smoke.sh

      - name: Dump service logs (only runs on failure, for diagnosis)
        if: failure()
        working-directory: infra
        run: docker compose -f docker-compose.yml logs --no-color

      - name: Tear down
        if: always()
        working-directory: infra
        run: docker compose -f docker-compose.yml down -v

  # BRIEF v1.6: launcher-core's Rust unit tests (images.rs's tarball
  # path-selection, secrets/config/health/seed logic, etc.) had NEVER run
  # in CI — only referenced for rust-cache warmup, never actually invoked.
  # It's deliberately dependency-free of the `tauri` crate specifically so
  # it builds and tests on any machine with a Rust toolchain (see its own
  # module docs) — no GTK/webkit system packages needed, so this doesn't
  # need to wait for or duplicate across build-desktop's 3-platform matrix.
  launcher-core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/launcher/launcher-core -> target
      - working-directory: apps/launcher/launcher-core
        run: cargo test

  # BRIEF v1.6: build-images.sh/save-images.sh/split-images.sh had never
  # been run for real before this brief (no container runtime in the dev
  # sandbox — see PACKAGE_REPORT.md §4) — a real first run found them not
  # even executable (missing +x, exit 126). This job keeps them exercised
  # on every push so that regression stays impossible to miss again,
  # without redoing the one-off empirical work OFFLINE_BUNDLE_REPORT.md
  # already settled (the real tarball size, and this repo's real
  # workflow-artifact size ceiling) on every single push. The actual
  # release-asset upload of the split chunks lives in release.yml, gated
  # on a real tag, not here.
  offline-bundle-regression-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Standard runners ship with a lot of preinstalled toolchains we don't
      # need (Android SDK, .NET, GHC, etc.) — free that up before building
      # several GB of images, rather than find out mid-build we ran out.
      - name: Reclaim disk space from unused preinstalled toolchains
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/local/.ghcup \
            /usr/share/dotnet /usr/local/share/powershell /usr/local/share/chromium \
            /usr/local/lib/node_modules 2>/dev/null || true

      - name: Build every image for real (scripts/package/build-images.sh)
        run: VANTAGE_VERSION=1.0.0 ./scripts/package/build-images.sh

      - name: Per-image size breakdown (informational)
        run: docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}"

      - name: Save every image into one offline tarball (scripts/package/save-images.sh)
        run: VANTAGE_VERSION=1.0.0 ./scripts/package/save-images.sh

      - name: Split into release-asset-sized chunks (scripts/package/split-images.sh)
        run: VANTAGE_VERSION=1.0.0 ./scripts/package/split-images.sh

      - name: Report the genuine measured size
        run: |
          du -h infra/vantage-images-1.0.0.tar
          sha256sum infra/vantage-images-1.0.0.tar
          ls -la infra/vantage-images-1.0.0.tar.part-*

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - working-directory: apps/web
        run: npm ci

      - name: Typecheck
        working-directory: apps/web
        run: npx tsc -b --noEmit

      - name: Production build (self-hosted fonts, CSP injection, runtime-config — BRIEF v1.4 SEC-05)
        working-directory: apps/web
        run: npm run build

      - name: npm audit — confirms the esbuild/Vite dev-server advisory (BRIEF v1.4 SEC-11) stays fixed
        working-directory: apps/web
        run: npm audit --audit-level=moderate

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks scans history, not just the working tree

      - name: Weapons-boundary merge gate (CLAUDE.md §1) — automated, not just a manual check
        run: ./scripts/check_weapons_boundary.sh

      - name: gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit — hash-pinned lockfiles (BRIEF v1.4 SEC-07)
        run: |
          pip install --quiet pip-audit
          echo "::group::apps/api"
          pip-audit -r apps/api/requirements.lock.txt
          echo "::endgroup::"
          echo "::group::services/tiler"
          pip-audit -r services/tiler/requirements.lock.txt
          echo "::endgroup::"
          echo "::group::services/inference"
          pip-audit -r services/inference/requirements.lock.txt
          echo "::endgroup::"
          echo "::group::infra/pgstac-migrate"
          pip-audit -r infra/pgstac-migrate/requirements.lock.txt
          echo "::endgroup::"
          # packages/geo has no separate lockfile — its only two dependencies
          # (numpy, rasterio) are already pinned and audited as part of
          # apps/api's lockfile (apps/api installs packages/geo as a local
          # path dependency), confirmed by:
          #   grep -c '^numpy==\|^rasterio==' apps/api/requirements.lock.txt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: npm audit (frontend) — also gated here, not just in the frontend job
        working-directory: apps/web
        run: npm ci && npm audit --audit-level=moderate

  # First real compile of the Tauri launcher this project has ever produced
  # — the development sandbox had no root, no GTK dev headers, and no
  # macOS/Windows hardware (see PACKAGE_REPORT.md's "Environment reality").
  # GitHub-hosted runners have all three.
  build-desktop:
    needs: [test, frontend, security-scan]
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Reconciled against the 5 packages found empirically in the v1.3
      # sandbox pass (PACKAGE_REPORT.md: libglib2.0-dev, libgtk-3-dev,
      # libwebkit2gtk-4.1-dev, librsvg2-dev, libayatana-appindicator3-dev —
      # everything `cargo check` asked for before hitting the root-access
      # wall) plus patchelf, which that pass never reached (it's needed at
      # the AppImage *bundling* step, after compilation, which the sandbox
      # never got to). Union of both lists, not a re-guess.
      - name: Install Linux system dependencies for Tauri
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/launcher/src-tauri -> target
            apps/launcher/launcher-core -> target

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build the frontend (bundled into the launcher's webview, not run as a container)
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Install the launcher's Tauri CLI
        working-directory: apps/launcher
        run: npm ci

      # Signing (SEC per BRIEF v1.5 Phase 1's "sign" step): wired, not
      # blocking — but found for real in CI (this run): `${{ secrets.X }}`
      # evaluates to an EMPTY STRING when the secret doesn't exist, it does
      # not omit the env var. Tauri's macOS bundler checks
      # `env::var("APPLE_CERTIFICATE").is_ok()`, which is true even for an
      # empty string, so setting these unconditionally made every
      # unsigned build crash trying to `security import` empty certificate
      # data, instead of skipping signing gracefully as intended. Only
      # write each var into $GITHUB_ENV when it's genuinely non-empty, so
      # an unconfigured var is truly absent (env::var returns Err) rather
      # than present-but-empty. Obtaining an Apple Developer Program
      # membership and a Windows code-signing certificate is the operator's
      # job — both require the operator's own identity and payment, not
      # something this pipeline can acquire on its own.
      - name: Export signing secrets only when actually configured (avoids Ok("") vs Err(NotPresent))
        shell: bash
        run: |
          set_if_present() {
            if [ -n "$2" ]; then
              echo "$1=$2" >> "$GITHUB_ENV"
            fi
          }
          set_if_present APPLE_CERTIFICATE "${{ secrets.APPLE_CERTIFICATE }}"
          set_if_present APPLE_CERTIFICATE_PASSWORD "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
          set_if_present APPLE_SIGNING_IDENTITY "${{ secrets.APPLE_SIGNING_IDENTITY }}"
          set_if_present APPLE_ID "${{ secrets.APPLE_ID }}"
          set_if_present APPLE_PASSWORD "${{ secrets.APPLE_PASSWORD }}"
          set_if_present APPLE_TEAM_ID "${{ secrets.APPLE_TEAM_ID }}"
          set_if_present WINDOWS_CERTIFICATE "${{ secrets.WINDOWS_CERTIFICATE }}"
          set_if_present WINDOWS_CERTIFICATE_PASSWORD "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"

      - name: Build (and sign, if certificates are configured)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/launcher

      # `uploadWorkflowArtifacts` is NOT a real tauri-action@v0 input (found
      # for real in CI, BRIEF v1.5 — it was silently ignored: a warning, not
      # a build failure, so this would have shipped with zero artifacts ever
      # produced). Upload the real bundle output explicitly instead.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vantage-launcher-${{ matrix.platform }}
          path: apps/launcher/src-tauri/target/release/bundle/**
          if-no-files-found: error
