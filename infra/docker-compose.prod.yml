# Production/packaged compose — used by the desktop launcher (apps/launcher),
# NOT for local development (see docker-compose.yml for that). Differences,
# all driven by BRIEF v1.3 §4:
#
#   - `image:`, never `build:` — every image is built and tagged once by
#     scripts/package/build-images.sh, not compiled at `compose up` time.
#   - Every host port is bound to 127.0.0.1 explicitly — this is a
#     single-workstation app; nothing should be reachable off-box.
#   - Named volumes are bind mounts under ${VANTAGE_DATA_DIR}, the directory
#     the first-run wizard picks (see apps/launcher/launcher-core/src/config.rs) —
#     not opaque `docker volume` storage, so uninstall/support-bundle/backup
#     can just point at a plain directory tree.
#   - Config/secrets come from ${VANTAGE_DATA_DIR}/config/.env, generated by
#     apps/launcher/launcher-core/src/secrets.rs on first run — never a repo
#     file, never baked into an image (§9), and never a Python dependency the
#     packaged app would need at runtime. See infra/.env.prod.template for
#     the schema that file follows.
#   - Every service that's reachable from the launcher's webview or from
#     scripts/smoke.sh has a healthcheck; the launcher health-gates the UI
#     on all of them going healthy (§11).
#
# Requires ${VANTAGE_DATA_DIR}/{postgres,minio,logs,config}/ to already exist
# — the launcher creates these before invoking `compose up` (see
# apps/launcher/launcher-core/src/config.rs::data_dirs()).
#
# Verified: docker-compose.yml's dev stack (this file's logic carried
# forward unchanged where not called out above) passes scripts/smoke.sh
# 15/15 against real Sentinel-2 data (see RUN_REPORT.md, PACKAGE_REPORT.md).
# This exact file has NOT been run end-to-end here — no container runtime is
# available in this sandbox (see PACKAGE_REPORT.md §"Environment reality").

# SEC-06: same treatment as docker-compose.yml's identical anchor — see that
# file's comment for the rationale. Applied to every app-owned service.
x-hardened: &hardened
  security_opt:
    - "no-new-privileges:true"
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp

services:
  db:
    image: ${VANTAGE_DB_IMAGE:-postgis/postgis:16-3.4}
    env_file: ${VANTAGE_DATA_DIR}/config/.env
    volumes:
      - ${VANTAGE_DATA_DIR}/postgres:/var/lib/postgresql/data
      - ${VANTAGE_DATA_DIR}/config/db-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${VANTAGE_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # SEC-01/SEC-07: pypgstac baked in at build time, hash-pinned — see
  # infra/pgstac-migrate/Dockerfile. Never a runtime pip install (that was
  # both an air-gap violation and unpinned).
  pgstac-migrate:
    image: ${VANTAGE_PGSTAC_MIGRATE_IMAGE:-vantage-pgstac-migrate:1.0.0}
    env_file: ${VANTAGE_DATA_DIR}/config/.env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # SEC-08: password-protected (${REDIS_PASSWORD} resolves from the
  # --env-file every launcher-issued compose invocation passes — see
  # compose.rs's base_args()) even though never published on a host port.
  redis:
    image: ${VANTAGE_REDIS_IMAGE:-redis:7-alpine}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ${VANTAGE_DATA_DIR}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: ${VANTAGE_MINIO_IMAGE:-minio/minio:latest}
    command: server /data --console-address ":9001"
    env_file: ${VANTAGE_DATA_DIR}/config/.env
    volumes:
      - ${VANTAGE_DATA_DIR}/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: ${VANTAGE_MINIO_MC_IMAGE:-minio/mc:latest}
    env_file: ${VANTAGE_DATA_DIR}/config/.env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET_ANALYSIS
      "
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  api-migrate:
    image: ${VANTAGE_API_IMAGE:-vantage-api:1.0.0}
    env_file: ${VANTAGE_DATA_DIR}/config/.env
    # Overrides the app's runtime DATABASE_URL (vantage_app, DML-only) with
    # the migration role (vantage_migrate) — see infra/db-init-prod and
    # generate_secrets.py, which keep this password in sync with what gets
    # written into the rendered db-init SQL.
    environment:
      DATABASE_URL: postgresql+psycopg://vantage_migrate:${VANTAGE_MIGRATE_PASSWORD}@db:5432/${POSTGRES_DB}
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
      pgstac-migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    <<: *hardened
    image: ${VANTAGE_API_IMAGE:-vantage-api:1.0.0}
    env_file: ${VANTAGE_DATA_DIR}/config/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:${VANTAGE_API_PORT:-8000}:8000"
    volumes:
      - ${VANTAGE_DATA_DIR}/logs:/var/log/vantage
      # Read-only: bundled demo scenes for IMAGERY_SOURCE=static_catalog
      # (BRIEF v1.3 §6). The launcher copies the installer's bundled
      # infra/demo-data/ resource here on first run — see
      # apps/launcher/launcher-core/src/seed.rs.
      - ${VANTAGE_DATA_DIR}/demo-data:/data/demo:ro
    healthcheck:
      # Found for real in CI (BRIEF v1.6): api's health route is mounted
      # under /api (apps/api/app/main.py's API_PREFIX) — docker-compose.yml
      # (dev) already had this right; this file didn't, so this service
      # would report perpetually unhealthy in every real packaged install.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      api-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # One-shot, idempotent: seeds the demo AOI/monitor/analysis/event so
  # Explore/Analyze/Monitor are all populated on first launch (BRIEF v1.3
  # §6). No-ops immediately if IMAGERY_SOURCE isn't static_catalog, or if
  # already seeded — see apps/api/app/scripts/seed_demo_data.py. Runs after
  # `api` (not just api-migrate) so it shares a running app process's config
  # validation rather than racing schema setup.
  demo-seed:
    <<: *hardened
    image: ${VANTAGE_API_IMAGE:-vantage-api:1.0.0}
    env_file: ${VANTAGE_DATA_DIR}/config/.env
    command: python -m app.scripts.seed_demo_data
    volumes:
      - ${VANTAGE_DATA_DIR}/demo-data:/data/demo:ro
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

  worker:
    <<: *hardened
    image: ${VANTAGE_API_IMAGE:-vantage-api:1.0.0}
    env_file: ${VANTAGE_DATA_DIR}/config/.env
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ${VANTAGE_DATA_DIR}/logs:/var/log/vantage
      - ${VANTAGE_DATA_DIR}/demo-data:/data/demo:ro
    depends_on:
      api-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      inference:
        condition: service_healthy

  beat:
    <<: *hardened
    image: ${VANTAGE_API_IMAGE:-vantage-api:1.0.0}
    env_file: ${VANTAGE_DATA_DIR}/config/.env
    # See docker-compose.yml's identical fix for why this points at /tmp —
    # found for real in CI (BRIEF v1.5).
    command: celery -A app.core.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    volumes:
      - ${VANTAGE_DATA_DIR}/logs:/var/log/vantage
    depends_on:
      api-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  tiler:
    <<: *hardened
    image: ${VANTAGE_TILER_IMAGE:-vantage-tiler:1.0.0}
    env_file: ${VANTAGE_DATA_DIR}/config/.env
    ports:
      - "127.0.0.1:${VANTAGE_TILER_PORT:-8001}:8000"
    volumes:
      - ${VANTAGE_DATA_DIR}/demo-data:/data/demo:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      minio:
        condition: service_healthy

  # Placeholder object detector — internal only, never port-mapped to the
  # host (only api/worker reach it over the compose network). Model weights
  # are already baked in at image-build time (services/inference/Dockerfile),
  # so this container needs zero runtime internet access.
  inference:
    <<: *hardened
    image: ${VANTAGE_INFERENCE_IMAGE:-vantage-inference:1.0.0}
    env_file: ${VANTAGE_DATA_DIR}/config/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # NOTE: no `web` service — the frontend is a static bundle inside the
  # Tauri launcher's webview (apps/web `npm run build` output), not a
  # container. See apps/launcher/README.md.
