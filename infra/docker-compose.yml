# SEC-06: applied to every app-owned service below (not the third-party
# db/redis/minio images, and not the one-shot init containers, to keep this
# pass's blast radius matched to what apps/api/services/tiler/services/inference's
# own Dockerfiles were changed to support — see those Dockerfiles' new
# non-root USER). no-new-privileges blocks setuid-based privilege escalation;
# cap_drop: ALL removes every Linux capability none of these processes need
# (no raw sockets, no ptrace, nothing); read_only + a /tmp tmpfs means even a
# code-execution bug can't persist a payload to disk.
x-hardened: &hardened
  security_opt:
    - "no-new-privileges:true"
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp

services:
  db:
    # -alpine (BRIEF v1.7 step 2): smaller than the Debian-based tag by
    # Docker Hub's own published sizes — gated on scripts/smoke.sh's real
    # AOI-geometry/pgstac-search coverage passing unchanged against it in
    # CI before this is trusted (see PACKAGING_V2_REPORT.md).
    # Fully-qualified, not a short name (BRIEF v1.8): found for real on a
    # packaged-app user's Podman install — Podman (unlike Docker) doesn't
    # assume docker.io for short names unless /etc/containers/registries.conf
    # explicitly says so, which many distros ship without configured at all.
    # Applied here too for dev/Podman consistency with docker-compose.prod.yml.
    image: docker.io/postgis/postgis:16-3.4-alpine
    env_file: .env
    volumes:
      - db_data:/var/lib/postgresql/data
      # Runs once, automatically, on first init (empty data dir) — creates
      # vantage_migrate/vantage_app so the app never runs as this bootstrap
      # superuser. See infra/db-init/01-roles.sql for the verified rationale.
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: provisions the `pgstac` schema (roles, tables, its own migration
  # history) alongside our `public` schema, which Alembic owns exclusively.
  # This is the seam a v2 local/air-gapped ImagerySource will read from — v1
  # app code doesn't query it yet (see apps/api/app/imagery/pgstac.py).
  # SEC-01/SEC-07: pypgstac is baked into this image at build time (hash-
  # pinned via infra/pgstac-migrate/requirements.lock.txt), not pip-installed
  # at container startup — see infra/pgstac-migrate/Dockerfile.
  pgstac-migrate:
    build:
      context: ..
      dockerfile: infra/pgstac-migrate/Dockerfile
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # SEC-08: requires auth even though it's never published on a host port —
  # a compromised container elsewhere on this compose network shouldn't get
  # a free pass to the broker. ${REDIS_PASSWORD} resolves from infra/.env
  # (docker compose auto-loads a .env next to the compose file for this
  # kind of command-level interpolation).
  redis:
    # Fully-qualified — see db's comment above (BRIEF v1.8). "library/" is
    # required for Docker Hub's official images, not just "docker.io/redis".
    image: docker.io/library/redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    # Fully-qualified — see db's comment above (BRIEF v1.8).
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: creates the private analysis-output bucket. Kept private (no
  # anonymous/public policy) — the tiler authenticates via the same MinIO
  # credentials over /vsis3/, it doesn't need public bucket access.
  minio-init:
    # Fully-qualified — see db's comment above (BRIEF v1.8).
    image: docker.io/minio/mc:latest
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET_ANALYSIS
      "
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  # One-shot: alembic upgrade head. A dedicated service (rather than an
  # api/worker/beat entrypoint script) so three containers never race
  # `alembic upgrade head` against each other on startup.
  api-migrate:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: .env
    # Overrides .env's DATABASE_URL (vantage_app, DML-only) with the
    # migration role (vantage_migrate, owns the schema) — the only place in
    # the whole stack this role is used. Verified: this role can run Alembic
    # end-to-end without ever touching the bootstrap superuser.
    # SEC-12: password comes from ${VANTAGE_MIGRATE_PASSWORD} (infra/.env),
    # not a literal here — infra/db-init/01-roles.sql is templated from the
    # same variable (see scripts/generate_dev_secrets.py) so they can't drift.
    environment:
      DATABASE_URL: postgresql+psycopg://vantage_migrate:${VANTAGE_MIGRATE_PASSWORD}@db:5432/${POSTGRES_DB}
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
      pgstac-migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    <<: *hardened
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    # SEC-03: loopback-only — this is a single-workstation dev stack, not a
    # LAN service. The container's own bind (--host 0.0.0.0 above) is fine;
    # it's the HOST-side publish address that controls real network
    # exposure, and that's what this binds to 127.0.0.1.
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      api-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    <<: *hardened
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: .env
    # PERF: celery's prefork pool defaults to one process per CPU core with
    # no --concurrency given -- fine for a shared server, but this is a
    # single-workstation app (see docker-compose.prod.yml's own framing) and
    # each concurrent change-detection task holds a full-resolution windowed
    # raster read (up to MAX_AOI_AREA_KM2's worth) in memory at once. A
    # default of 12 concurrent tasks on a 12-thread laptop CPU with modest
    # RAM headroom is a real way to make the whole machine crawl, not just
    # this container. 2 lets an on-demand analysis and a monitor sweep run
    # side by side without either queuing behind the other, while capping
    # worst-case concurrent memory use -- raise CELERY_WORKER_CONCURRENCY in
    # .env for a beefier or shared deployment.
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    depends_on:
      api-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      inference:
        condition: service_healthy

  beat:
    <<: *hardened
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: .env
    # --schedule points celery beat's gdbm-backed schedule file at the /tmp
    # tmpfs (see the *hardened anchor) instead of its default of CWD (/app) —
    # found for real in CI (BRIEF v1.5): read_only: true means beat can't
    # write anywhere else, and it crashes at startup if it tries.
    command: celery -A app.core.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    depends_on:
      api-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # Dynamic COG tiling only — no pixel pyramids are ever persisted. Reads
  # public Earth Search COGs via /vsicurl/ and our own MinIO output COGs via
  # /vsis3/ from the same process (see services/tiler/app/main.py).
  tiler:
    <<: *hardened
    build:
      context: ..
      dockerfile: services/tiler/Dockerfile
    env_file: .env
    ports:
      - "127.0.0.1:8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      minio:
        condition: service_healthy

  # Placeholder object detector (torchvision, COCO-pretrained; no Ultralytics
  # YOLO — see CLAUDE.md licensing constraints). Called synchronously from the
  # Celery worker right after a successful change-detection analysis; not
  # exposed externally, only worker/api reach it over the compose network.
  inference:
    <<: *hardened
    build:
      context: ..
      dockerfile: services/inference/Dockerfile
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # NOTE: `web` (apps/web) is intentionally not defined here — for dev, run it
  # with `npm install && npm run dev` directly; the api/tiler base URLs come
  # from apps/web/public/runtime-config.json (fetched at app startup, not a
  # build-time env var — see apps/web/src/lib/runtimeConfig.ts), whose
  # checked-in defaults already match this compose file's port mappings.
  # The packaged desktop build (infra/docker-compose.prod.yml) bundles the
  # frontend into the Tauri launcher instead of running it as a container.

volumes:
  db_data:
  minio_data:
